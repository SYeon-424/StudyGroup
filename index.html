<script>
(function () {
  try {
    var saved = localStorage.getItem("studygroup-theme");
    var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  } catch (e) {}
})();
</script>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @font-face {
    font-family: "LXGW WenKai Mono KR";
    src: url("./fonts/LXGWWenKaiMonoKR-Regular.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root,
  [data-theme="light"] {
    --color-bg: #f2f0e8;
    --color-grid-dot: rgba(31, 36, 48, 0.07);
    --color-surface: #fffdf8;
    --color-surface-2: #ece8dc;
    --color-border: #ddd6c4;
    --color-text: #262220;
    --color-text-muted: #7a7568;
    --color-accent: #b5402f;
    --color-accent-strong: #963423;
    --color-accent-soft: rgba(181, 64, 47, 0.12);
    --color-accent-contrast: #fdf6ee;
    --color-success: #2e6b4f;
    --color-success-soft: rgba(46, 107, 79, 0.12);
    --color-warning: #9c7a1f;
    --color-warning-soft: rgba(156, 122, 31, 0.14);
    --shadow-card: 0 1px 2px rgba(38, 34, 32, 0.05), 0 10px 24px -14px rgba(38, 34, 32, 0.18);
  }

  [data-theme="dark"] {
    --color-bg: #16171c;
    --color-grid-dot: rgba(230, 227, 218, 0.06);
    --color-surface: #1f2127;
    --color-surface-2: #26282f;
    --color-border: #34363f;
    --color-text: #e9e6dc;
    --color-text-muted: #93908a;
    --color-accent: #e2685a;
    --color-accent-strong: #ee8577;
    --color-accent-soft: rgba(226, 104, 90, 0.16);
    --color-accent-contrast: #1a1315;
    --color-success: #5cb891;
    --color-success-soft: rgba(92, 184, 145, 0.16);
    --color-warning: #d3ab52;
    --color-warning-soft: rgba(211, 171, 82, 0.16);
    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.35), 0 14px 30px -16px rgba(0, 0, 0, 0.6);
  }

  * { border-color: var(--color-border); }

  body {
    background-color: var(--color-bg);
    color: var(--color-text);
    font-family: "LXGW WenKai Mono KR", "Noto Sans KR", ui-sans-serif, system-ui, sans-serif;
    background-image: radial-gradient(var(--color-grid-dot) 1px, transparent 1px);
    background-size: 22px 22px;
    transition: background-color 0.2s ease, color 0.2s ease;
    min-height: 100vh;
  }

  h1, h2, .brand-word, .stat-num { font-family: "LXGW WenKai Mono KR", "Noto Sans KR", ui-sans-serif, sans-serif; }

  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 1.1rem;
    box-shadow: var(--shadow-card);
  }

  .brand-bg { background-color: var(--color-accent); color: var(--color-accent-contrast); }
  .brand-bg:hover { background-color: var(--color-accent-strong); }
  .brand-text { color: var(--color-accent); }
  .brand-ring:focus { outline: none; box-shadow: 0 0 0 2px var(--color-accent-soft), 0 0 0 1px var(--color-accent); }

  .surface-input {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    color: var(--color-text);
  }
  .surface-input::placeholder { color: var(--color-text-muted); }

  input[type="text"],
  input[type="email"],
  input[type="password"] {
    background: var(--color-surface);
    color: var(--color-text);
  }
  input::placeholder { color: var(--color-text-muted); opacity: 1; }

  .muted { color: var(--color-text-muted); }

  .theme-toggle-btn {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 50;
    width: 2.5rem;
    height: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 9999px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-card);
    font-size: 1.1rem;
    cursor: pointer;
    color: var(--color-text);
  }
  .theme-toggle-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }

  /* 채점 도장 스타일 상태 버튼 */
  .stamp {
    width: 2.1rem;
    height: 2.1rem;
    min-width: 2.1rem;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "LXGW WenKai Mono KR", sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    border: 2px solid var(--color-border);
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .stamp:hover { transform: scale(1.06); }
  .stamp:active { transform: scale(0.9); }
  .stamp-unsolved { border-style: dashed; }
  .stamp-solved {
    border-color: var(--color-accent);
    color: var(--color-accent);
    background: var(--color-accent-soft);
    transform: rotate(-8deg);
  }
  .stamp-solved:hover { transform: rotate(-8deg) scale(1.06); }
  .stamp-unknown {
    border-color: var(--color-warning);
    color: var(--color-warning);
    background: var(--color-warning-soft);
    transform: rotate(6deg);
  }
  .stamp-unknown:hover { transform: rotate(6deg) scale(1.06); }

  .mini-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 11px;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    border: 1px solid transparent;
  }
  .mini-unsolved { background: var(--color-surface-2); color: var(--color-text-muted); border-color: var(--color-border); }
  .mini-solved { background: var(--color-accent-soft); color: var(--color-accent); }
  .mini-unknown { background: var(--color-warning-soft); color: var(--color-warning); }

  .stamp-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2rem;
    height: 2rem;
    min-width: 2rem;
    border: 2px solid var(--color-accent);
    border-radius: 9999px;
    color: var(--color-accent);
    font-weight: 700;
    font-size: 1.05rem;
    transform: rotate(-8deg);
  }

  .problem-row {
    padding: 0.55rem 0.7rem;
  }
  .problem-title-text {
    font-size: 0.85rem;
    line-height: 1.3;
  }
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.6rem;
    height: 1.6rem;
    min-width: 1.6rem;
    border-radius: 0.4rem;
    color: var(--color-text-muted);
    font-size: 0.85rem;
    cursor: pointer;
    background: transparent;
    border: none;
  }
  .icon-btn:hover { background: var(--color-surface-2); color: var(--color-text); }
  .icon-btn:disabled { opacity: 0.3; cursor: default; }
  .icon-btn:disabled:hover { background: transparent; color: var(--color-text-muted); }
  .collapse-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.4rem;
    height: 1.4rem;
    min-width: 1.4rem;

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  try {
    localStorage.setItem(THEME_KEY, theme);
  } catch (e) {}
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.setAttribute("content", theme === "dark" ? "#16171c" : "#f2f0e8");
}

function initTheme() {
  const current = document.documentElement.getAttribute("data-theme") || "light";
  applyTheme(current);

async function fetchGroupsWithProgress(userId) {
  const { data: memberships } = await sb.from("group_members").select("group_id").eq("user_id", userId);
  const groupIds = (memberships || []).map((m) => m.group_id);
  if (groupIds.length === 0) return [];

  const { data: groups } = await sb.from("groups").select("id, name, invite_code").in("id", groupIds);

  const { data: membersData } = await sb
    .from("group_members")
    .select("group_id, user_id, profiles(username)")
    .in("group_id", groupIds);

  const membersByGroup = {};
  (membersData || []).forEach((row) => {
    if (!membersByGroup[row.group_id]) membersByGroup[row.group_id] = [];
    membersByGroup[row.group_id].push({
      user_id: row.user_id,
      username: row.profiles ? row.profiles.username : "(알 수 없음)",
    });
  });

  const { data: problemsData } = await sb.from("problems").select("id, group_id, parent_id").in("group_id", groupIds);
  const allProblems = problemsData || [];
  const parentIds = new Set(allProblems.map((p) => p.parent_id).filter(Boolean));
  const leafProblems = allProblems.filter((p) => !parentIds.has(p.id));

  const leafIdsByGroup = {};
  leafProblems.forEach((p) => {
    if (!leafIdsByGroup[p.group_id]) leafIdsByGroup[p.group_id] = [];
    leafIdsByGroup[p.group_id].push(p.id);
  });

  const allLeafIds = leafProblems.map((p) => p.id);
  let statusRows = [];
  if (allLeafIds.length > 0) {
    const { data: statusesData } = await sb
      .from("statuses")
      .select("problem_id, user_id, status")
      .in("problem_id", allLeafIds)
      .eq("status", "solved");
    statusRows = statusesData || [];
  }

  return (groups || []).map((g) => {
    const total = (leafIdsByGroup[g.id] || []).length;
    const leafSet = new Set(leafIdsByGroup[g.id] || []);
    const members = membersByGroup[g.id] || [];
    const progress = members.map((m) => {
      const solved = statusRows.filter((s) => s.user_id === m.user_id && leafSet.has(s.problem_id)).length;
      return { user_id: m.user_id, username: m.username, solved, total };
    });
    return { ...g, progress };
  });
}

        </form>

  document.getElementById("new-group-form").addEventListener("submit", async (e) => {

    const submitBtn = document.getElementById("new-group-submit");

    errEl.classList.add("hidden");

    const { data: group, error: groupError } = await sb

      errEl.classList.remove("hidden");

    }

      errEl.classList.remove("hidden");
      return;
    }

    location.hash = `#/group/${group.id}`;
  });
}

function buildTree(problems) {
  const map = new Map();
  problems.forEach((p) => map.set(p.id, { ...p, children: [] }));
  const roots = [];
  map.forEach((node) => {
    if (node.parent_id && map.has(node.parent_id)) {
      map.get(node.parent_id).children.push(node);
    } else {
      roots.push(node);
    }
  });
  roots.sort((a, b) => a.position - b.position);
  map.forEach((node) => node.children.sort((a, b) => a.position - b.position));
  return roots;
}

function buildStatusMap(statuses) {
  const m = {};
  statuses.forEach((s) => (m[`${s.problem_id}::${s.user_id}`] = s.status));
  return m;
}

function getSiblings(problems, parentId) {
  return problems.filter((p) => (p.parent_id || null) === (parentId || null)).sort((a, b) => a.position - b.position);
}

function collectDescendantIds(problems, parentId) {
  const direct = problems.filter((p) => p.parent_id === parentId).map((p) => p.id);
  let all = [...direct];
  direct.forEach((id) => {
    all = all.concat(collectDescendantIds(problems, id));
  });
  return all;
}

async function fetchGroupDetail(groupId) {
  const { data: group } = await sb.from("groups").select("id, name, invite_code").eq("id", groupId).maybeSingle();
  if (!group) return null;

  const { data: membersData } = await sb
    .from("group_members")
    .select("user_id, profiles(username)")
    .eq("group_id", groupId);
  const members = (membersData || []).map((m) => ({
    user_id: m.user_id,
    username: m.profiles ? m.profiles.username : "(알 수 없음)",
  }));

  const { data: problems } = await sb
    .from("problems")
    .select("id, group_id, parent_id, title, position, created_by")
    .eq("group_id", groupId)
    .order("position", { ascending: true });

  let statuses = [];
  if (problems && problems.length > 0) {
    const ids = problems.map((p) => p.id);
    const { data: statusData } = await sb.from("statuses").select("problem_id, user_id, status").in("problem_id", ids);
    statuses = statusData || [];
  }

  return { group, members, problems: problems || [], statuses };
}

// 검색어/상태 필터를 적용해 트리를 필터링. 조상이 검색어에 매치되면 그 하위는 전부 매치된 것으로 취급.
function filterTree(nodes, state) {
  const q = state.searchQuery.trim().toLowerCase();

  function walk(node, ancestorMatched) {
    const titleMatch = ancestorMatched || !q || node.title.toLowerCase().includes(q);
    const isLeaf = node.children.length === 0;

    if (isLeaf) {
      if (!titleMatch) return null;
      const status = state.statusMap[`${node.id}::${state.currentUserId}`] || "unsolved";
      if (state.statusFilter !== "all" && status !== state.statusFilter) return null;
      return node;
    }

    const filteredChildren = node.children.map((c) => walk(c, titleMatch)).filter(Boolean);
    if (filteredChildren.length === 0) return null;
    return { ...node, children: filteredChildren };
  }

  return nodes.map((n) => walk(n, false)).filter(Boolean);
}

function renderProblemNode(node, depth, state) {
  const isLeaf = node.children.length === 0;
  const isRoot = depth === 0;
  const status = isLeaf ? state.statusMap[`${node.id}::${state.currentUserId}`] || "unsolved" : null;
  const cfg = status ? STATUS_CONFIG[status] : null;
  const isFiltering = state.searchQuery.trim() !== "" || state.statusFilter !== "all";
  const isCollapsed = !isFiltering && state.collapsedIds.has(node.id);

  const othersHtml =
    isLeaf && state.members.length > 1
      ? `<div class="flex flex-wrap gap-1.5 mt-2 pt-2 border-t" style="border-color:var(--color-border)">` +
        state.members
          .filter((m) => m.user_id !== state.currentUserId)
          .map((m) => {
            const s = state.statusMap[`${node.id}::${m.user_id}`] || "unsolved";
            const c = STATUS_CONFIG[s];
            return `<span class="${c.miniCls}" title="${c.label}">${c.symbol} ${escapeHtml(m.username)}</span>`;
          })
          .join("") +
        `</div>`
      : "";

  const dragHandleHtml =
    isRoot && !isFiltering
      ? `<span class="drag-handle" title="드래그해서 순서 변경">⠿</span>`
      : `<span style="width:1rem;display:inline-block;"></span>`;

  const titleHtml = `<p class="problem-title-text font-medium flex-1">${escapeHtml(node.title)}</p>`;

  const controlsHtml = `<div class="flex items-center gap-0.5 shrink-0">
        ${
          isRoot
            ? `<button data-id="${node.id}" class="edit-btn icon-btn" title="수정" aria-label="수정">✎</button>
        <button data-id="${node.id}" class="delete-btn icon-btn" title="삭제" aria-label="삭제">🗑</button>`
            : ""
        }
        ${
          isLeaf
            ? `<button data-toggle-id="${node.id}" title="${cfg.label}" aria-label="${cfg.label}" class="toggle-status-btn ${cfg.stampCls}">${cfg.symbol}</button>`
            : ""
        }
      </div>`;

  const collapseBtnHtml = node.children.length
    ? `<button data-collapse-id="${node.id}" class="collapse-btn ${isCollapsed ? "is-collapsed" : ""}" title="펼치기/접기" aria-label="펼치기/접기">▾</button>`
    : `<span style="width:1.4rem;display:inline-block;"></span>`;

  const childrenHtml =
    node.children.length && !isCollapsed
      ? `<div class="mt-1.5 space-y-1.5">${node.children.map((c) => renderProblemNode(c, depth + 1, state)).join("")}</div>`
      : "";

  return `
    <div ${isRoot ? `data-sort-id="${node.id}"` : ""} style="margin-left:${depth * 14}px">
      <div class="card problem-row">
        <div class="flex items-center gap-1.5">
          ${dragHandleHtml}
          ${collapseBtnHtml}
          ${titleHtml}
          ${controlsHtml}
        </div>
        ${othersHtml}
      </div>
      ${childrenHtml}
    </div>`;
}

// 손잡이(handleSelector)를 눌러 itemSelector에 해당하는 형제 요소들의 순서를 드래그로 바꾸는 범용 유틸.
// 드롭 시 새 순서의 data-sort-id 배열을 onReorder로 전달.
//
// [수정] itemSelector로 ":scope > ..." 형태를 받는 경우, querySelectorAll에는 그대로 쓰지만
// closest()에 쓸 때는 ":scope >" 부분을 제거해야 한다. closest()에서 :scope는
// "호출한 요소 자신"을 기준으로 해석되므로, handle.closest(":scope > div[data-sort-id]")는
// "handle의 자식이면서 조상인 요소"를 찾으라는 뜻이 되어 절대 매칭되지 않는다.
// 이 때문에 pointerdown 시 item이 항상 null이 되어 드래그가 시작되지 않았다.
function initSortable(container, itemSelector, handleSelector, onReorder) {
  let draggingEl = null;
  const closestSelector = itemSelector.replace(/^:scope\s*>\s*/, "");

  function getItems() {
    return Array.from(container.querySelectorAll(itemSelector));
  }

  function onPointerMove(e) {
    if (!draggingEl) return;
    const y = e.clientY;
    const items = getItems().filter((i) => i !== draggingEl);
    let target = null;
    for (const item of items) {
      const rect = item.getBoundingClientRect();
      if (y < rect.top + rect.height / 2) {
        target = item;
        break;
      }
    }
    if (target) container.insertBefore(draggingEl, target);
    else container.appendChild(draggingEl);
  }

  function onPointerUp() {
    if (!draggingEl) return;
    draggingEl.classList.remove("dragging-item");
    document.body.classList.remove("no-select");
    const finished = draggingEl;
    draggingEl = null;
    document.removeEventListener("pointermove", onPointerMove);
    document.removeEventListener("pointerup", onPointerUp);
    const order = getItems().map((el) => el.getAttribute("data-sort-id"));
    onReorder(order);
  }

  container.addEventListener("pointerdown", (e) => {
    const handle = e.target.closest(handleSelector);
    if (!handle || !container.contains(handle)) return;
    const item = handle.closest(closestSelector);
    if (!item) return;
    e.preventDefault();
    draggingEl = item;
    draggingEl.classList.add("dragging-item");
    document.body.classList.add("no-select");
    document.addEventListener("pointermove", onPointerMove);
    document.addEventListener("pointerup", onPointerUp);
  });
}

// 서버와 상태가 어긋났을 때 문제/상태를 다시 불러와 동기화.
async function refreshProblems() {
  const s = window.__detailState;
  const detail = await fetchGroupDetail(s.groupId);
  if (!detail) return;
  s.members = detail.members;
  s.problems = detail.problems;
  s.statusMap = buildStatusMap(detail.statuses);
  renderTree();
  renderEditPanel();
}

// 검색/포커스를 유지한 채 문제 트리 부분만 다시 그림.
function renderTree(opts) {
  const s = window.__detailState;
  const container = document.getElementById("problem-tree");
  if (!container) return;

  const fullTree = buildTree(s.problems);
  const visibleTree = filterTree(fullTree, s);

  const hasAnyProblem = s.problems.length > 0;
  const isFiltering = s.searchQuery.trim() !== "" || s.statusFilter !== "all";

  let html;
  if (visibleTree.length) {
    html = visibleTree.map((n) => renderProblemNode(n, 0, s)).join("");
  } else if (!hasAnyProblem) {
    html = `<p class="text-sm text-[var(--color-text-muted)] text-center py-16">아직 등록된 문제가 없습니다. 위의 '문제 등록' 버튼으로 추가해보세요.</p>`;
  } else if (isFiltering) {
    html = `<p class="text-sm text-[var(--color-text-muted)] text-center py-16">조건에 맞는 문제가 없습니다.</p>`;
  } else {
    html = "";
  }

  container.innerHTML = html;

  if (opts && opts.keepSearchFocus) {
    const input = document.getElementById("problem-search-input");
    if (input) {
      input.focus();
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }
  }

  container.querySelectorAll(".toggle-status-btn").forEach((btn) => {
    btn.addEventListener("click", () => handleToggleStatus(btn.getAttribute("data-toggle-id")));
  });
  container.querySelectorAll(".collapse-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-collapse-id");
      if (s.collapsedIds.has(id)) s.collapsedIds.delete(id);
      else s.collapsedIds.add(id);
      renderTree();
    });
  });
  container.querySelectorAll(".edit-btn").forEach((btn) => {
    btn.addEventListener("click", () => openEditPanel(btn.getAttribute("data-id")));
  });
  container.querySelectorAll(".delete-btn").forEach((btn) => {
    btn.addEventListener("click", () => handleDeleteProblem(btn.getAttribute("data-id")));
  });

  if (!isFiltering && !container.dataset.sortableAttached) {
    initSortable(container, ":scope > div[data-sort-id]", ".drag-handle", (orderedIds) => persistOrder(orderedIds));
    container.dataset.sortableAttached = "1";
  }
}

async function handleToggleStatus(problemId) {
  const s = window.__detailState;
  const key = `${problemId}::${s.currentUserId}`;
  const prev = s.statusMap[key] || "unsolved";
  const next = STATUS_CONFIG[prev].next;

  s.statusMap[key] = next;
  renderTree();

  const { error } = await sb
    .from("statuses")
    .upsert({ problem_id: problemId, user_id: s.currentUserId, status: next }, { onConflict: "problem_id,user_id" });

  if (error) {
    s.statusMap[key] = prev;
    renderTree();
  }
}

async function handleDeleteProblem(problemId) {
  if (!confirm("이 문제를 삭제할까요? 하위 소문항이 있다면 함께 삭제됩니다.")) return;
  const s = window.__detailState;

  const descendantIds = collectDescendantIds(s.problems, problemId);
  const idsToDelete = [...descendantIds, problemId];

  const prevProblems = s.problems;
  const prevStatusMap = { ...s.statusMap };

  s.problems = s.problems.filter((p) => !idsToDelete.includes(p.id));
  Object.keys(s.statusMap).forEach((key) => {
    if (idsToDelete.some((id) => key.startsWith(`${id}::`))) delete s.statusMap[key];
  });
  if (s.editPanelId && idsToDelete.includes(s.editPanelId)) s.editPanelId = null;
  renderTree();
  renderEditPanel();

  const { error: statusError } = await sb.from("statuses").delete().in("problem_id", idsToDelete);
  const { error: problemError } = await sb.from("problems").delete().in("id", idsToDelete);

  if (statusError || problemError) {
    s.problems = prevProblems;
    s.statusMap = prevStatusMap;
    alert("삭제에 실패했습니다. 다시 시도해주세요.");
    renderTree();
  }
}

// 최상위 문제 목록의 순서를 저장. parentId가 없으면 최상위(루트) 문제들의 순서.
async function persistOrder(orderedIds) {
  const s = window.__detailState;
  orderedIds.forEach((id, i) => {
    const p = s.problems.find((pp) => pp.id === id);
    if (p) p.position = i;
  });
  renderTree();

  try {
    const results = await Promise.all(orderedIds.map((id, i) => sb.from("problems").update({ position: i }).eq("id", id)));
    if (results.some((r) => r.error)) throw new Error("update failed");
  } catch (e) {
    alert("순서 저장에 실패했습니다. 다시 불러옵니다.");
    await refreshProblems();
  }
}

// ===================== 문제 수정 패널 (제목 수정 + 소문항 관리) =====================

function openEditPanel(problemId) {
  const s = window.__detailState;
  s.editPanelId = problemId;
  renderEditPanel();
}

function closeEditPanel() {
  const s = window.__detailState;
  s.editPanelId = null;
  renderEditPanel();
}

function renderEditPanel() {
  const s = window.__detailState;
  const overlay = document.getElementById("edit-panel-overlay");
  if (!overlay) return;

  if (!s.editPanelId) {
    overlay.innerHTML = "";
    return;
  }

  const root = s.problems.find((p) => p.id === s.editPanelId);
  if (!root) {
    s.editPanelId = null;
    overlay.innerHTML = "";
    return;
  }

  const subs = getSiblings(s.problems, root.id);

  const subsHtml = subs
    .map(
      (sub) => `
      <div class="panel-sub-row" data-sort-id="${sub.id}">
        <span class="drag-handle" title="드래그해서 순서 변경">⠿</span>
        <input type="text" class="panel-sub-input flex-1 rounded-md border border-[var(--color-border)] px-2 py-1.5 text-sm brand-ring" data-id="${sub.id}" value="${escapeHtml(sub.title)}" placeholder="소문항 제목" />
        <button data-id="${sub.id}" class="panel-delete-sub-btn icon-btn" title="삭제" aria-label="삭제">🗑</button>
      </div>`
    )
    .join("");

  overlay.innerHTML = `
    <div class="modal-backdrop" id="edit-panel-backdrop">
      <div class="modal-card card p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold">문제 수정</h2>
          <button id="edit-panel-close" class="icon-btn" title="닫기" aria-label="닫기">✕</button>
        </div>

        <label class="text-xs text-[var(--color-text-muted)] mb-1 block">문제 제목</label>
        <input type="text" id="panel-title-input" class="w-full rounded-lg border border-[var(--color-border)] px-3 py-2 text-sm brand-ring mb-5" value="${escapeHtml(root.title)}" />

        <div class="flex items-center justify-between mb-2">
          <label class="text-xs text-[var(--color-text-muted)]">소문항</label>
          <button id="panel-add-sub-btn" type="button" class="text-xs font-medium brand-text">+ 소문항 추가</button>
        </div>
        <div id="panel-sublist" class="space-y-2">
          ${subsHtml || `<p class="text-xs text-[var(--color-text-muted)] py-2">소문항이 없습니다.</p>`}
        </div>
      </div>
    </div>
  `;

  document.getElementById("edit-panel-backdrop").addEventListener("click", (e) => {
    if (e.target.id === "edit-panel-backdrop") closeEditPanel();
  });
  document.getElementById("edit-panel-close").addEventListener("click", closeEditPanel);

  const titleInput = document.getElementById("panel-title-input");
  titleInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      titleInput.blur();
    }
  });
  titleInput.addEventListener("blur", () => handleSaveTitle(root.id, titleInput));

  document.getElementById("panel-add-sub-btn").addEventListener("click", () => handleAddSub(root.id));

  const sublist = document.getElementById("panel-sublist");
  sublist.querySelectorAll(".panel-sub-input").forEach((input) => {
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        input.blur();
      }
    });
    input.addEventListener("blur", () => handleSaveTitle(input.getAttribute("data-id"), input));
  });
  sublist.querySelectorAll(".panel-delete-sub-btn").forEach((btn) => {
    btn.addEventListener("click", () => handleDeleteSub(btn.getAttribute("data-id")));
  });

  if (subs.length > 1) {
    initSortable(sublist, ":scope > .panel-sub-row", ".drag-handle", (orderedIds) => persistOrder(orderedIds));
  }
}

async function handleSaveTitle(problemId, inputEl) {
  const s = window.__detailState;
  const problem = s.problems.find((p) => p.id === problemId);
  if (!problem) return;

  const newTitle = inputEl.value.trim();
  if (!newTitle) {
    inputEl.value = problem.title;
    return;
  }
  if (newTitle === problem.title) return;

  const prev = problem.title;
  problem.title = newTitle;
  renderTree();

  const { error } = await sb.from("problems").update({ title: newTitle }).eq("id", problemId);
  if (error) {
    problem.title = prev;
    inputEl.value = prev;
    alert("수정에 실패했습니다. 다시 시도해주세요.");
    renderTree();
  }
}

async function handleAddSub(parentId) {
  const s = window.__detailState;
  const siblings = getSiblings(s.problems, parentId);
  const nextPosition = siblings.length;

  const { data, error } = await sb
    .from("problems")
    .insert({ group_id: s.groupId, parent_id: parentId, title: "새 소문항", position: nextPosition, created_by: s.currentUserId })
    .select()
    .single();

  if (error || !data) {
    alert("소문항 추가에 실패했습니다. 다시 시도해주세요.");
    return;
  }

  s.problems.push(data);
  s.collapsedIds.delete(parentId);
  renderTree();
  renderEditPanel();

  requestAnimationFrame(() => {
    const input = document.querySelector(`.panel-sub-input[data-id="${data.id}"]`);
    if (input) {
      input.focus();
      input.select();
    }
  });
}

async function handleDeleteSub(subId) {
  if (!confirm("이 소문항을 삭제할까요?")) return;
  const s = window.__detailState;

  const prevProblems = s.problems;
  const prevStatusMap = { ...s.statusMap };

  s.problems = s.problems.filter((p) => p.id !== subId);
  Object.keys(s.statusMap).forEach((key) => {
    if (key.startsWith(`${subId}::`)) delete s.statusMap[key];
  });
  renderTree();
  renderEditPanel();

  const { error: statusError } = await sb.from("statuses").delete().eq("problem_id", subId);
  const { error: problemError } = await sb.from("problems").delete().eq("id", subId);

  if (statusError || problemError) {
    s.problems = prevProblems;
    s.statusMap = prevStatusMap;
    alert("삭제에 실패했습니다. 다시 시도해주세요.");
    renderTree();
    renderEditPanel();
  }
}

let draftProblems = [];

function emptyDraftProblem() {
  return { title: "", subs: [] };
}

async function renderNewProblem(user, groupId) {
  draftProblems = [emptyDraftProblem()];
  renderApp(`
    <div class="max-w-2xl mx-auto px-4 py-8">
      <a href="#/group/${groupId}" class="text-sm text-[var(--color-text-muted)]">← 그룹으로</a>
      <h1 class="text-2xl font-bold mt-2 mb-6">문제 등록</h1>
      <form id="new-problem-form" class="space-y-4">
        <div id="draft-problems"></div>
        <button type="button" id="add-problem-btn" class="w-full rounded-lg border border-dashed border-[var(--color-border)] text-[var(--color-text-muted)] text-sm py-2.5 hover:bg-[var(--color-surface-2)]">+ 문제 추가</button>
        <p id="new-problem-error" class="text-sm text-[var(--color-accent)] hidden"></p>
        <button type="submit" id="new-problem-submit" class="w-full rounded-lg brand-bg font-medium py-2.5">등록 완료</button>
      </form>
    </div>
  `);

  drawDraftProblems();

  document.getElementById("add-problem-btn").addEventListener("click", () => {
    draftProblems.push(emptyDraftProblem());
    drawDraftProblems();
  });

  // 기존 최상위 문제 개수를 가져와서, 새 문제들이 그 뒤(맨 아래)에 이어지도록 시작 position을 구함
  const { count } = await sb
    .from("problems")
    .select("id", { count: "exact", head: true })
    .eq("group_id", groupId)
    .is("parent_id", null);
  const startPosition = count || 0;

  document.getElementById("new-problem-form").addEventListener("submit", (e) => handleSubmitProblems(e, user, groupId, startPosition));
}

function focusLastTitleInput() {
  requestAnimationFrame(() => {
    const inputs = document.querySelectorAll(".title-input");
    const last = inputs[inputs.length - 1];
    if (last) last.focus();
  });
}

function focusLastSubInput(problemIdx) {
  requestAnimationFrame(() => {
    const inputs = document.querySelectorAll(`.sub-input[data-p="${problemIdx}"]`);
    const last = inputs[inputs.length - 1];
    if (last) last.focus();
  });
}

function drawDraftProblems() {
  const container = document.getElementById("draft-problems");
  container.innerHTML = draftProblems
    .map((p, idx) => {
      const subsHtml = p.subs
        .map(
          (sub, subIdx) => `
          <div class="flex items-center gap-2">
            <span class="text-xs text-[var(--color-text-muted)]">${idx + 1}-${subIdx + 1}</span>
            <input type="text" data-p="${idx}" data-s="${subIdx}" class="sub-input flex-1 rounded-lg border border-[var(--color-border)] px-3 py-1.5 text-sm brand-ring" placeholder="소문항 제목 (예: (1), (2))" value="${escapeHtml(sub)}" />
            <button type="button" data-p="${idx}" data-s="${subIdx}" class="remove-sub-btn text-xs text-[var(--color-text-muted)] hover:text-[var(--color-accent)]">삭제</button>
          </div>`
        )
        .join("");

      return `
        <div class="card p-4" data-problem-block="${idx}">
          <div class="flex items-center gap-2">
            <span class="text-xs text-[var(--color-text-muted)] shrink-0">${idx + 1}.</span>
            <input type="text" data-p="${idx}" class="title-input flex-1 rounded-lg border border-[var(--color-border)] px-3 py-2 text-sm brand-ring" placeholder="문제 제목 (예: 1번 문제, 확률과 통계 3번)" value="${escapeHtml(p.title)}" />
            ${
              draftProblems.length > 1
                ? `<button type="button" data-p="${idx}" class="remove-problem-btn text-xs text-[var(--color-text-muted)] hover:text-[var(--color-accent)] shrink-0">삭제</button>`
                : ""
            }
          </div>
          ${subsHtml ? `<div class="mt-3 ml-6 space-y-2">${subsHtml}</div>` : ""}
          <button type="button" data-p="${idx}" class="add-sub-btn mt-3 ml-6 text-xs font-medium brand-text">+ 소문항 추가</button>
        </div>`;
    })
    .join("");

  container.querySelectorAll(".title-input").forEach((input) => {
    input.addEventListener("input", (e) => {
      draftProblems[+e.target.dataset.p].title = e.target.value;
    });
    input.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      draftProblems.push(emptyDraftProblem());
      drawDraftProblems();
      focusLastTitleInput();
    });
  });
  container.querySelectorAll(".sub-input").forEach((input) => {
    input.addEventListener("input", (e) => {
      draftProblems[+e.target.dataset.p].subs[+e.target.dataset.s] = e.target.value;
    });
    input.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      const p = +e.target.dataset.p;
      draftProblems[p].subs.push("");
      drawDraftProblems();
      focusLastSubInput(p);
    });
  });
  container.querySelectorAll(".add-sub-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      draftProblems[+e.target.dataset.p].subs.push("");
      drawDraftProblems();
    });
  });
  container.querySelectorAll(".remove-sub-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      const p = +e.target.dataset.p;
      const si = +e.target.dataset.s;
      draftProblems[p].subs.splice(si, 1);
      drawDraftProblems();
    });
  });
  container.querySelectorAll(".remove-problem-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      draftProblems.splice(+e.target.dataset.p, 1);
      drawDraftProblems();
    });
  });
}

async function handleSubmitProblems(e, user, groupId, startPosition) {
  e.preventDefault();
  const errEl = document.getElementById("new-problem-error");
  const submitBtn = document.getElementById("new-problem-submit");
  errEl.classList.add("hidden");

  const cleaned = draftProblems
    .map((p) => ({ title: p.title.trim(), subs: p.subs.map((s) => s.trim()).filter(Boolean) }))
    .filter((p) => p.title.length > 0);

  if (cleaned.length === 0) {
    errEl.textContent = "최소 하나 이상의 문제를 입력해주세요.";
    errEl.classList.remove("hidden");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "등록 중...";

  const base = startPosition || 0;
  const { data: insertedParents, error: parentError } = await sb
    .from("problems")
    .insert(cleaned.map((p, idx) => ({ group_id: groupId, title: p.title, position: base + idx, created_by: user.id })))
    .select();

  if (parentError || !insertedParents) {
    submitBtn.disabled = false;
    submitBtn.textContent = "등록 완료";
    errEl.textContent = "문제 등록에 실패했습니다. 다시 시도해주세요.";
    errEl.classList.remove("hidden");
    return;
  }

  const subRows = [];
  insertedParents.forEach((parent, idx) => {
    cleaned[idx].subs.forEach((subTitle, subIdx) => {
      subRows.push({ group_id: groupId, parent_id: parent.id, title: subTitle, position: subIdx, created_by: user.id });
    });
  });

  if (subRows.length > 0) {
    const { error: subError } = await sb.from("problems").insert(subRows);
    if (subError) {
      submitBtn.disabled = false;
      submitBtn.textContent = "등록 완료";
      errEl.textContent = "소문항 등록 중 일부 오류가 발생했습니다.";
      errEl.classList.remove("hidden");
      return;
    }
  }

  location.hash = `#/group/${groupId}`;
}
</script>
