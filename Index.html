<body>
  <div id="app" class="min-h-screen"></div>

<script>
// =========================================================
// 0. Supabase 설정 -- 여기에 본인의 프로젝트 값을 넣으세요
// =========================================================
const SUPABASE_URL = "https://apmvrlymguvusjjuflnm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_wMZnT9CV1AOLcChun86gVQ_BvRN-XxO";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =========================================================
// 1. 유틸
// =========================================================
function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

const STATUS_CONFIG = {
  unsolved: { label: "미해결", cls: "bg-gray-100 text-gray-500", next: "solved" },
  solved: { label: "해결", cls: "bg-green-100 text-green-700", next: "unknown" },
  unknown: { label: "모르겠음", cls: "bg-amber-100 text-amber-700", next: "unsolved" },
};

function renderApp(html) {
  document.getElementById("app").innerHTML = html;
}

function generateInviteCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "";
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function currentUser() {
  const { data } = await sb.auth.getSession();
  return data.session ? data.session.user : null;
}

async function getProfile(userId) {
  const { data } = await sb.from("profiles").select("id, username").eq("id", userId).maybeSingle();
  return data;
}

// =========================================================
// 2. 라우터
// =========================================================
async function route() {
  const hash = location.hash || "#/groups";
  const path = hash.replace(/^#/, "");
  const parts = path.split("/").filter(Boolean); // ["group", "<id>", "new-problem"]

  const user = await currentUser();

  if (!user) {
    if (path === "/signup") return renderSignup();
    return renderLogin();
  }

  const profile = await getProfile(user.id);
  if (!profile) {
    if (path !== "/onboarding") {
      location.hash = "#/onboarding";
      return;
    }
    return renderOnboarding(user);
  }

  if (path === "/login" || path === "/signup" || path === "/onboarding" || path === "") {
    location.hash = "#/groups";
    return;
  }

  if (path === "/groups") return renderGroupsList(user, profile);
  if (path === "/new-group") return renderNewGroup(user);
  if (parts[0] === "group" && parts[1]) {
    if (parts[2] === "new-problem") return renderNewProblem(user, parts[1]);
    return renderGroupDetail(user, parts[1]);
  }

  location.hash = "#/groups";
}

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", () => {
  route();
  registerServiceWorker();
});
sb.auth.onAuthStateChange(() => route());

function registerServiceWorker() {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  }
}

// =========================================================
// 3. 로그인 / 회원가입 / 온보딩
// =========================================================
function renderLogin() {
  renderApp(`
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm p-8">
        <h1 class="text-2xl font-bold mb-1">StudyGroup</h1>
        <p class="text-sm text-gray-500 mb-6">로그인해서 스터디를 시작하세요</p>
        <form id="login-form" class="space-y-4">

async function fetchGroupsWithProgress(userId) {
  const { data: memberships } = await sb.from("group_members").select("group_id").eq("user_id", userId);
  const groupIds = (memberships || []).map((m) => m.group_id);
  if (groupIds.length === 0) return [];

  const { data: groups } = await sb.from("groups").select("id, name, invite_code").in("id", groupIds);

  const { data: membersData } = await sb
    .from("group_members")
    .select("group_id, user_id, profiles(username)")
    .in("group_id", groupIds);

  const membersByGroup = {};
  (membersData || []).forEach((row) => {
    if (!membersByGroup[row.group_id]) membersByGroup[row.group_id] = [];
    membersByGroup[row.group_id].push({
      user_id: row.user_id,
      username: row.profiles ? row.profiles.username : "(알 수 없음)",
    });
  });

  const { data: problemsData } = await sb.from("problems").select("id, group_id, parent_id").in("group_id", groupIds);
  const allProblems = problemsData || [];
  const parentIds = new Set(allProblems.map((p) => p.parent_id).filter(Boolean));
  const leafProblems = allProblems.filter((p) => !parentIds.has(p.id));

  const leafIdsByGroup = {};
  leafProblems.forEach((p) => {
    if (!leafIdsByGroup[p.group_id]) leafIdsByGroup[p.group_id] = [];
    leafIdsByGroup[p.group_id].push(p.id);
  });

  const allLeafIds = leafProblems.map((p) => p.id);
  let statusRows = [];
  if (allLeafIds.length > 0) {
    const { data: statusesData } = await sb
      .from("statuses")
      .select("problem_id, user_id, status")
      .in("problem_id", allLeafIds)
      .eq("status", "solved");
    statusRows = statusesData || [];
  }

  return (groups || []).map((g) => {
    const total = (leafIdsByGroup[g.id] || []).length;
    const leafSet = new Set(leafIdsByGroup[g.id] || []);
    const members = membersByGroup[g.id] || [];
    const progress = members.map((m) => {
      const solved = statusRows.filter((s) => s.user_id === m.user_id && leafSet.has(s.problem_id)).length;
      return { user_id: m.user_id, username: m.username, solved, total };
    });
    return { ...g, progress };
  });
}

// 6. 그룹 상세 (문제 트리 + 상태 토글)
// =========================================================
function buildTree(problems) {
  const map = new Map();
  problems.forEach((p) => map.set(p.id, { ...p, children: [] }));
  const roots = [];
  map.forEach((node) => {
    if (node.parent_id && map.has(node.parent_id)) {
      map.get(node.parent_id).children.push(node);
    } else {
      roots.push(node);
    }
  });
  return roots;
}

function buildStatusMap(statuses) {
  const m = {};
  statuses.forEach((s) => (m[`${s.problem_id}::${s.user_id}`] = s.status));
  return m;
}

async function fetchGroupDetail(groupId) {
  const { data: group } = await sb.from("groups").select("id, name, invite_code").eq("id", groupId).maybeSingle();
  if (!group) return null;

  const { data: membersData } = await sb
    .from("group_members")
    .select("user_id, profiles(username)")
    .eq("group_id", groupId);
  const members = (membersData || []).map((m) => ({
    user_id: m.user_id,
    username: m.profiles ? m.profiles.username : "(알 수 없음)",
  }));

  const { data: problems } = await sb
    .from("problems")
    .select("id, group_id, parent_id, title, position, created_by")
    .eq("group_id", groupId)
    .order("position", { ascending: true });

  let statuses = [];
  if (problems && problems.length > 0) {
    const ids = problems.map((p) => p.id);
    const { data: statusData } = await sb.from("statuses").select("problem_id, user_id, status").in("problem_id", ids);
    statuses = statusData || [];
  }

  return { group, members, problems: problems || [], statuses };
}

function renderProblemNode(node, depth, state) {
  const isLeaf = node.children.length === 0;
  const status = isLeaf ? state.statusMap[`${node.id}::${state.currentUserId}`] || "unsolved" : null;
  const cfg = status ? STATUS_CONFIG[status] : null;

  const othersHtml =
    isLeaf && state.members.length > 1
      ? `<div class="flex flex-wrap gap-1.5 mt-3 pt-3 border-t border-gray-100">` +
        state.members
          .filter((m) => m.user_id !== state.currentUserId)
          .map((m) => {
            const s = state.statusMap[`${node.id}::${m.user_id}`] || "unsolved";
            const c = STATUS_CONFIG[s];
            return `<span class="text-[11px] px-2 py-0.5 rounded-full ${c.cls}">${escapeHtml(m.username)}: ${c.label}</span>`;
          })
          .join("") +
        `</div>`
      : "";

  const childrenHtml = node.children.length
    ? `<div class="mt-2 space-y-2">${node.children.map((c) => renderProblemNode(c, depth + 1, state)).join("")}</div>`
    : "";

  return `
    <div style="margin-left:${depth * 16}px">
      <div class="bg-white rounded-xl border border-gray-200 p-4">
        <div class="flex items-start justify-between gap-3">
          <p class="font-medium text-sm flex-1">${escapeHtml(node.title)}</p>
          ${
            isLeaf
              ? `<button data-toggle-id="${node.id}" class="toggle-status-btn shrink-0 text-xs font-medium px-3 py-1.5 rounded-full ${cfg.cls}">${cfg.label}</button>`
              : ""
          }
        </div>
        ${othersHtml}
      </div>
      ${childrenHtml}
    </div>`;
}

  renderApp(`<div class="max-w-2xl mx-auto px-4 py-8"><p class="text-sm text-gray-400 text-center py-16">불러오는 중...</p></div>`);

  }

function drawGroupDetail() {
  const s = window.__detailState;
  const tree = buildTree(s.problems);
  const treeHtml = tree.length
    ? tree.map((n) => renderProblemNode(n, 0, s)).join("")
    : `<p class="text-sm text-gray-400 text-center py-16">아직 등록된 문제가 없습니다. 위의 '문제 등록' 버튼으로 추가해보세요.</p>`;

  const membersHtml = s.members
    .map(
      (m) =>
        `<span class="text-xs bg-white border border-gray-200 rounded-full px-3 py-1">${escapeHtml(m.username)}${
          m.user_id === s.currentUserId ? " (나)" : ""
        }</span>`
    )
    .join("");

  renderApp(`
    <div class="max-w-2xl mx-auto px-4 py-8">
      <a href="#/groups" class="text-sm text-gray-400">← 그룹 목록</a>
      <div class="flex items-center justify-between mt-2 mb-6">

        <a href="#/group/${s.groupId}/new-problem" class="rounded-lg brand-bg text-white text-sm font-medium px-4 py-2">+ 문제 등록</a>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 px-4 py-3 flex items-center justify-between">
        <div>
          <p class="text-xs text-gray-400">초대 코드</p>
          <p class="text-lg font-mono font-semibold tracking-widest">${escapeHtml(s.group.invite_code)}</p>
        </div>
        <button id="copy-invite-btn" class="text-sm font-medium brand-text">복사</button>
      </div>

      <div class="mt-6 mb-4">
        <h2 class="text-sm font-semibold text-gray-500 mb-2">그룹원 (${s.members.length})</h2>
        <div class="flex flex-wrap gap-2">${membersHtml}</div>
      </div>

      <div class="space-y-3 mt-4">${treeHtml}</div>
    </div>
  `);

  document.getElementById("copy-invite-btn").addEventListener("click", async (e) => {
    try {
      await navigator.clipboard.writeText(s.group.invite_code);
      e.target.textContent = "복사됨!";
      setTimeout(() => (e.target.textContent = "복사"), 1500);
    } catch {}
  });

  document.querySelectorAll(".toggle-status-btn").forEach((btn) => {
    btn.addEventListener("click", () => handleToggleStatus(btn.getAttribute("data-toggle-id")));
  });
}

async function handleToggleStatus(problemId) {
  const s = window.__detailState;
  const key = `${problemId}::${s.currentUserId}`;
  const prev = s.statusMap[key] || "unsolved";
  const next = STATUS_CONFIG[prev].next;

  s.statusMap[key] = next;
  drawGroupDetail();

  const { error } = await sb
    .from("statuses")
    .upsert({ problem_id: problemId, user_id: s.currentUserId, status: next }, { onConflict: "problem_id,user_id" });

  if (error) {
    s.statusMap[key] = prev;
    drawGroupDetail();
  }
}

        <p id="new-problem-error" class="text-sm text-red-500 hidden"></p>
        <button type="submit" id="new-problem-submit" class="w-full rounded-lg brand-bg text-white font-medium py-2.5">등록 완료</button>
      </form>
    </div>
  `);

  drawDraftProblems();

  document.getElementById("add-problem-btn").addEventListener("click", () => {
    draftProblems.push(emptyDraftProblem());
    drawDraftProblems();
  });

  document.getElementById("new-problem-form").addEventListener("submit", (e) => handleSubmitProblems(e, user, groupId));
}

function drawDraftProblems() {
  const container = document.getElementById("draft-problems");
  container.innerHTML = draftProblems
    .map((p, idx) => {
      const subsHtml = p.subs
        .map(
          (sub, subIdx) => `
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400">${idx + 1}-${subIdx + 1}</span>
            <input type="text" data-p="${idx}" data-s="${subIdx}" class="sub-input flex-1 rounded-lg border border-gray-300 px-3 py-1.5 text-sm brand-ring" placeholder="소문항 제목 (예: (1), (2))" value="${escapeHtml(sub)}" />
            <button type="button" data-p="${idx}" data-s="${subIdx}" class="remove-sub-btn text-xs text-gray-400 hover:text-red-500">삭제</button>
          </div>`
        )
        .join("");

      return `
        <div class="bg-white rounded-xl border border-gray-200 p-4" data-problem-block="${idx}">
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400 shrink-0">${idx + 1}.</span>
            <input type="text" data-p="${idx}" class="title-input flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm brand-ring" placeholder="문제 제목 (예: 1번 문제, 확률과 통계 3번)" value="${escapeHtml(p.title)}" />
            ${
              draftProblems.length > 1
                ? `<button type="button" data-p="${idx}" class="remove-problem-btn text-xs text-gray-400 hover:text-red-500 shrink-0">삭제</button>`
                : ""
            }
          </div>
          ${subsHtml ? `<div class="mt-3 ml-6 space-y-2">${subsHtml}</div>` : ""}
          <button type="button" data-p="${idx}" class="add-sub-btn mt-3 ml-6 text-xs font-medium brand-text">+ 소문항 추가</button>
        </div>`;
    })
    .join("");

  container.querySelectorAll(".title-input").forEach((input) => {
    input.addEventListener("input", (e) => {
      draftProblems[+e.target.dataset.p].title = e.target.value;
    });
  });
  container.querySelectorAll(".sub-input").forEach((input) => {
    input.addEventListener("input", (e) => {
      draftProblems[+e.target.dataset.p].subs[+e.target.dataset.s] = e.target.value;
    });
  });
  container.querySelectorAll(".add-sub-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      draftProblems[+e.target.dataset.p].subs.push("");
      drawDraftProblems();
    });
  });
  container.querySelectorAll(".remove-sub-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      const p = +e.target.dataset.p;
      const si = +e.target.dataset.s;
      draftProblems[p].subs.splice(si, 1);
      drawDraftProblems();
    });
  });
  container.querySelectorAll(".remove-problem-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      draftProblems.splice(+e.target.dataset.p, 1);
      drawDraftProblems();
    });
  });
}

async function handleSubmitProblems(e, user, groupId) {
  e.preventDefault();
  const errEl = document.getElementById("new-problem-error");
  const submitBtn = document.getElementById("new-problem-submit");
  errEl.classList.add("hidden");

  const cleaned = draftProblems
    .map((p) => ({ title: p.title.trim(), subs: p.subs.map((s) => s.trim()).filter(Boolean) }))
    .filter((p) => p.title.length > 0);

  if (cleaned.length === 0) {
    errEl.textContent = "최소 하나 이상의 문제를 입력해주세요.";
    errEl.classList.remove("hidden");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "등록 중...";

  const { data: insertedParents, error: parentError } = await sb
    .from("problems")
    .insert(cleaned.map((p, idx) => ({ group_id: groupId, title: p.title, position: idx, created_by: user.id })))
    .select();

  if (parentError || !insertedParents) {
    submitBtn.disabled = false;
    submitBtn.textContent = "등록 완료";
    errEl.textContent = "문제 등록에 실패했습니다. 다시 시도해주세요.";
    errEl.classList.remove("hidden");
    return;
  }

  const subRows = [];
  insertedParents.forEach((parent, idx) => {
    cleaned[idx].subs.forEach((subTitle, subIdx) => {
      subRows.push({ group_id: groupId, parent_id: parent.id, title: subTitle, position: subIdx, created_by: user.id });
    });
  });

  if (subRows.length > 0) {
    const { error: subError } = await sb.from("problems").insert(subRows);
    if (subError) {
      submitBtn.disabled = false;
      submitBtn.textContent = "등록 완료";
      errEl.textContent = "소문항 등록 중 일부 오류가 발생했습니다.";
      errEl.classList.remove("hidden");
      return;
    }
  }

  location.hash = `#/group/${groupId}`;
}
</script>
</body>
</html>
